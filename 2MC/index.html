<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2MB - Índice</title>
    <style>
        :root {
            /* Paleta de colores inspirada en Dracula Theme (usado en reveal.js) */
            --bg-color: #282a36;
            --text-color: #f8f8f2;
            --heading-color: #bd93f9;
            --subheading-color: #ff79c6;
            --clase-color: #f1fa8c;
            --link-color: #8be9fd;
            --link-hover-color: #50fa7b;
            --bullet-color: #ffb86c;
            --border-color: #6272a4;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Source Sans Pro', Helvetica, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        h2 {
            color: var(--heading-color);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h3 {
            color: var(--subheading-color);
            font-size: 1.8rem;
            margin-top: 2.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }

        .clase {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--clase-color);
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
        }

        ul {
            list-style-type: none;
            padding-left: 1.5rem;
            margin-bottom: 1.5rem;
        }

        ul li {
            position: relative;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }

        /* Viñetas personalizadas para mantener el estilo ide */
        ul li::before {
            content: "▹";
            color: var(--bullet-color);
            position: absolute;
            left: -1.2rem;
        }

        a {
            color: var(--link-color);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        a:hover {
            color: var(--link-hover-color);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>2MB Física</h2>
        
        <a href="https://www.canva.com/design/DAHDJhKSCwI/ZVoL5wEfi4aCSXZG7QmbZQ/edit">Canva introductorio</a>
        
        <h3>Unidad 0: Unidades de medida</h3>
        <ul>
            <li><a href="https://docs.google.com/presentation/d/1qLdhmtsg_xo-YJJ0kCQMl6ot_tNTQUITxg-ncM3Xlpo/edit?usp=sharing">Unidades de medida</a></li>
            <li><a href="https://docs.google.com/presentation/d/1PnemaIuC-dWZkFEC2hI3QFfCZnuHOvSD">8M 2026 - Orientación</a></li>
        </ul>
    </div>
</body>
</html>
