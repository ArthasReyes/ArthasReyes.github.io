    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/plugin/math/math.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/plugin/highlight/highlight.js"></script>
    <script src="../../timer.js"></script>
    <script>
    Reveal.initialize({
        hash: true,
        transition: 'fade',
        slideNumber: 'c/t',
        center: true,
        margin: 0.02,
        width: 1280,
        height: 720,
        minScale: 0.1,
        maxScale: 3.0,
        plugins: [ RevealMath.KaTeX, RevealHighlight ]
    });

    // Restart videos when slide becomes active
    Reveal.on('slidechanged', function(event) {
        // pause videos in previous slide
        var prevVids = event.previousSlide ? event.previousSlide.querySelectorAll('video') : [];
        prevVids.forEach(v => v.pause());

        // reset and play videos in current slide
        var currVids = event.currentSlide ? event.currentSlide.querySelectorAll('video') : [];
        currVids.forEach(v => {
            v.currentTime = 0;
            v.play();
        });
    });
</script>
