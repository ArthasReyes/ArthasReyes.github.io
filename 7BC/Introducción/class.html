<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U2</title>
    
    <!-- Archivos CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/reveal.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/reveal.js/4.6.1/theme/dracula.css" id="theme">

<body>

    <div class="slides">

            <img class="logo" src="Pictures/logo.png" alt="Logo Institución" />

            <img class="r-stretch" src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/57/Geogebra.svg/1280px-Geogebra.svg.png" width="100" />

    </div>
    </div>
    <!-- Scripts -->

    <script>
        Reveal.initialize({
            hash: true,
            transition: 'fade',

            center: true,
            plugins: [ RevealMath.KaTeX ]
