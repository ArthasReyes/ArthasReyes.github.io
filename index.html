<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenida</title>
    <style>
        :root {
            --bg-color: #282a36;
            --text-color: #f8f8f2;
            --heading-color: #bd93f9;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Source Sans Pro', Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        
        .container {
            max-width: 600px;
            padding: 3rem;
            border: 1px solid #6272a4;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            color: var(--heading-color);
            font-size: 3rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenid@s</h1>
        <p>Este es el repositorio central de material educativo.</p>
    </div>
</body>
</html>
